services:
  redis:
    image: redis:alpine
    container_name: esp_redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    mem_limit: 100m
    mem_reservation: 50m
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  garage:
    build:
      context: .
      dockerfile: Dockerfile.garage
    environment:
      - GARAGE_ADMIN_TOKEN=b17312060d5b4e572e8052dbb073d6e7
      - S3_ACCESS_KEY_ID=GK39eb72624df14cf0b66afa79
      - S3_SECRET_ACCESS_KEY=b607bde5e96a7f99175f9945441bd059d366e404655394e44f4bbc835b5accd7
      - S3_BUCKET_NAME=video-bucket
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage_data:/var/lib/garage
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/3900' 2>/dev/null && echo 'OK' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 25s
    networks:
      - internal
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mqtt-broker:
    image: eclipse-mosquitto:latest
    env_file:
      - ./mosquitto/config/.env 
    container_name: mosquitto
    restart: unless-stopped
    mem_limit: 100m
    mem_reservation: 50m
    cpus: "0.5"
    networks:
      - internal
    ports:
    # Порт нужен наружу для ESP, и стоит авторизация по паролю
    # Переменные авторизации в .env и ставяться через скрипт
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      - ./mosquitto/config/init-mosquitto.sh:/init-mosquitto.sh
    command: ["sh", "-c", "chmod +x /init-mosquitto.sh && sh /init-mosquitto.sh"]
    healthcheck:
      test: timeout 5 mosquitto_sub -t '$$SYS/broker/uptime' -u $${MQTT_USERNAME} -P $${MQTT_PASSWORD} -C 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
      

  esp_loki:
    image: grafana/loki:3.0.0
    container_name: esp_loki
    mem_limit: 200m
    mem_reservation: 100m
    cpus: "0.5"
    command: 
      - -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
      - ./loki-local-config.yaml:/etc/loki/local-config.yaml:ro
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3100/loki/api/v1/status/buildinfo"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"      # логи могут быть больше
        max-file: "3"

  esp_service:
    build: ./esp_service
    container_name: esp_service
    restart: unless-stopped
    env_file:
      - ./esp_service/.env
    environment:
      - AWS_ACCESS_KEY_ID=GK39eb72624df14cf0b66afa79
      - AWS_SECRET_ACCESS_KEY=b607bde5e96a7f99175f9945441bd059d366e404655394e44f4bbc835b5accd7
    depends_on:
      redis:
        condition: service_healthy
      mqtt-broker:
        condition: service_healthy
      garage:
        condition: service_healthy
    networks:
      - internal
    ports:
    # Даем Web API, но оно доступно только на localhost, а оттуда его подхватит nginx и переведет на https
      # - "127.0.0.1:8005:8005"
      - "8005:8005"
    volumes:
      - ./esp_service/data:/app/data
    mem_limit: 200m
    mem_reservation: 100m
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/health'); print('healthy')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  esp_front:
    build: ./esp_front
    container_name: esp_front
    restart: unless-stopped
    networks:
      - internal
    ports:
    # Только локальный проброс, это для nginx
      - "127.0.0.1:3008:3008"
    environment:
      - NODE_ENV=production
    mem_limit: 300m
    cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  esp_grafana:
    image: grafana/grafana:latest
    container_name: esp_grafana
    ports:
    # Даем ей выход, порт 3000 занят remnawave, поэтому даем 3001 для просмотра логов,
    # У графаны есть авторизация, включил. Но она по http, нужен переход на https
      - "127.0.0.1:3010:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_LOG_LEVEL=warn
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    mem_limit: 300m
    mem_reservation: 150m
    cpus: "0.5"
    depends_on:
      esp_loki:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "--silent", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  esp_promtail:
    image: grafana/promtail:3.0.0
    container_name: esp_promtail
    restart: unless-stopped
    mem_limit: 100m
    mem_reservation: 50m
    cpus: "0.5"
    command:
      - -config.file=/etc/promtail/config.yaml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yaml:/etc/promtail/config.yaml:ro
    depends_on:
      esp_service:
        condition: service_healthy
      esp_loki:
        condition: service_healthy
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  redis_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local
  garage_data:
    driver: local

networks:
  internal:
    name: esp_internal_network
    driver: bridge